name: Python Flask CI/CD with SonarCloud, GHCR & EC2

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr-task

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Repository Structure
        run: |
          pwd
          ls -R

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV

      - name: Verify Python Environment
        run: |
          python -c "import os; print(os.getcwd())"
          python -c "import sys; print(sys.path)"
          python -c "from app import app"
          echo "Import Successful"

      - name: Run Unit Tests & Generate Coverage
        run: |
          pytest -v --cov=. --cov-report=xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Convert Repository Owner to Lowercase
        id: vars
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=$OWNER" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          IMAGE=ghcr.io/${{ steps.vars.outputs.owner }}/${{ env.IMAGE_NAME }}

          docker build \
            -t $IMAGE:latest \
            -t $IMAGE:${{ github.sha }} \
            .

      - name: Push Docker Image
        run: |
          IMAGE=ghcr.io/${{ steps.vars.outputs.owner }}/${{ env.IMAGE_NAME }}

          docker push $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            IMAGE=ghcr.io/${{ steps.vars.outputs.owner }}/${{ env.IMAGE_NAME }}:latest

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u "${{ github.actor }}" \
              --password-stdin

            docker pull $IMAGE

            docker stop flask-app || true
            docker rm flask-app || true

            docker run -d \
              --name flask-app \
              --restart unless-stopped \
              -p 80:5000 \
              $IMAGE

            sleep 10

            curl --fail http://localhost/health

            docker image prune -f